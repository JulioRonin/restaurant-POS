<!DOCTYPE html>
<html lang="es" class="bg-servirest-hueso" style="color-scheme: light; background-color: #FAF8F4;">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="color-scheme" content="light only" />
    <title>ServiRest — Administración, atención y operación de tu restaurante</title>
    <meta name="theme-color" content="#FAF8F4" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#1A1E2E" media="(prefers-color-scheme: dark)" />
    <meta name="description" content="ServiRest · POS, KDS, hostess, caja y reportes en un solo lugar. Aliados del rubro, no proveedores carísimos." />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="ServiRest" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..900;1,9..144,300..900&family=Inter:wght@300;400;500;600;700;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">

    <!--
      CRITICAL CSS FALLBACK
      Inlined so the page renders with brand canvas + sane container limits
      even before Vite's compiled CSS arrives (or if a stylesheet 404s on a
      bad deploy). Without this the LockScreen avatars render at full viewport
      width because Tailwind utilities are absent and <img> has no constraint.
      Keep this minimal — only what's needed to prevent visual catastrophes.
    -->
    <style>
      html, body {
        margin: 0;
        padding: 0;
        background-color: #FAF8F4;
        color: #2A2826;
        font-family: 'Inter', ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      body { overflow: hidden; }
      img { max-width: 100%; height: auto; display: block; }
      button { font-family: inherit; cursor: pointer; }
      *, *::before, *::after { box-sizing: border-box; }
      /* Ensure any image inside a constrained avatar wrapper can't blow up
         even before utility classes apply. */
      [class*="rounded-full"] > img,
      [class*="rounded-2xl"] > img,
      [class*="rounded-3xl"] > img,
      [class*="rounded-solaris"] > img,
      .profile img,
      .avatar img,
      .sb-mark img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        border-radius: inherit;
      }
      /* Hide the empty React root until CSS is ready, so users never see
         a flash of giant unstyled HTML. Removed in 250ms in case CSS races. */
      #root:empty + script + style ~ noscript { display: none; }
    </style>

    <link rel="stylesheet" href="/index.css">
  </head>
  <body class="bg-servirest-hueso text-servirest-carbon antialiased" style="background-color: #FAF8F4; color: #2A2826; overflow: hidden;">
    <div id="root"></div>
    <div id="print-root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
